---
layout: default
---

<article class="post">
    <div class="meta">
        <span class="hash">#{{ page.date | date: "%s" | slice: -6, 6 }}</span>
        <span>{{ page.date | date: "%b %-d, %Y" }}</span>
    </div>
    <h1>{{ page.title }}</h1>
    <div class="content">{{ content }}</div>
    <a class="back-link" href="{{ '/' | relative_url }}"
        >&larr; back to the log</a
    >
</article>
